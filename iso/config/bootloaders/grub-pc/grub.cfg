set default=0
set timeout=5

insmod all_video
insmod gfxterm

if loadfont /boot/grub/unicode.pf2 ; then
    set gfxmode=auto
    terminal_output gfxterm
fi

set color_normal=white/black
set color_highlight=black/light-gray
set menu_color_normal=white/black
set menu_color_highlight=black/light-gray

menuentry "Erasure — Secure Disk Wipe Tool" {
    linux /live/vmlinuz boot=live components quiet splash timezone=UTC
    initrd /live/initrd.img
}

menuentry "Erasure — Safe Mode (no splash, verbose)" {
    linux /live/vmlinuz boot=live components timezone=UTC
    initrd /live/initrd.img
}

menuentry "Erasure — To RAM (eject USB after boot)" {
    linux /live/vmlinuz boot=live components toram quiet splash timezone=UTC
    initrd /live/initrd.img
}
