name: Build Bootable ISO

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-iso:
    name: Build Erasure ISO
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install live-build and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build debian-archive-keyring \
            isolinux syslinux-common syslinux-utils \
            grub-efi-amd64-bin grub-pc-bin \
            mtools xorriso

      - name: Debug live-build EFI scripts
        run: |
          ls -la /usr/lib/live/build/binary_grub* 2>/dev/null || echo "No grub scripts found"
          ls -la /usr/lib/live/build/binary*efi* 2>/dev/null || echo "No efi scripts found"
          grep -r "BOOTLOADER_EFI" /usr/lib/live/build/ 2>/dev/null | head -5 || echo "No EFI references"
          grep -r "grub-efi" /usr/lib/live/build/binary_grub* 2>/dev/null | head -5 || echo "No grub-efi refs"

      - name: Build ISO
        run: |
          cd iso
          sudo bash build.sh

      - name: Find ISO artifact
        id: iso
        run: |
          ISO_PATH=$(ls iso/erasure-*.iso 2>/dev/null | head -1)
          if [ -z "$ISO_PATH" ]; then
            echo "ERROR: No ISO file found"
            exit 1
          fi
          ISO_NAME=$(basename "$ISO_PATH")
          echo "path=$ISO_PATH" >> "$GITHUB_OUTPUT"
          echo "name=$ISO_NAME" >> "$GITHUB_OUTPUT"
          echo "Found ISO: $ISO_NAME ($(du -h "$ISO_PATH" | cut -f1))"

      - name: Compute SHA-256 checksum
        run: |
          sha256sum "${{ steps.iso.outputs.path }}" > "${{ steps.iso.outputs.path }}.sha256"
          cat "${{ steps.iso.outputs.path }}.sha256"

      - name: Upload ISO as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.iso.outputs.name }}
          path: |
            ${{ steps.iso.outputs.path }}
            ${{ steps.iso.outputs.path }}.sha256
          retention-days: 30

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Erasure ${{ github.ref_name }}
          body: |
            ## Erasure ${{ github.ref_name }}

            ### Downloads

            - **`${{ steps.iso.outputs.name }}`** — Bootable ISO. Flash to USB with Rufus or `dd`.
            - **`.sha256`** — Checksum file for integrity verification.

            ### Quick Start

            1. Download the ISO
            2. Flash to USB: `sudo dd if=${{ steps.iso.outputs.name }} of=/dev/sdX bs=4M status=progress`
            3. Create a DATA partition on the remaining USB space (FAT32, label `ERASURE_DATA`)
            4. Copy your `company.csv`, `operators.csv`, `assets.csv`, and `logo.png` to the DATA partition
            5. Boot target machine from USB
          files: |
            ${{ steps.iso.outputs.path }}
            ${{ steps.iso.outputs.path }}.sha256
          draft: false
          prerelease: false
